<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | AL-Faran School of Excellence</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-body">

    <div class="login-container animate-fade-in">

        <!-- Header -->
        <div class="login-header">
            <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
            <div class="login-logo">
                <img src="assets/logo.png" alt="AL-Faran Logo" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h2>AL-Faran School of Excellence</h2>
            <p style="font-size: 0.9rem; opacity: 0.9;">Password Recovery</p>
        </div>

        <!-- Forgot Password Form -->
        <div class="login-form-area" style="padding-top: 20px;">
            <div id="step-1" class="login-view active">
                <div class="text-center mb-4">
                    <h3 class="text-primary">Reset Password</h3>
                    <p class="text-muted" style="font-size: 0.85rem;">Enter your Login ID to continue</p>
                </div>

                <div id="error-msg"
                    style="display: none; color: white; background-color: var(--danger-color); padding: 10px; border-radius: var(--radius-md); text-align: center; margin-bottom: 15px; font-size: 0.9rem;">
                </div>

                <form onsubmit="handleVerifyId(event)">
                    <div class="form-group mb-4">
                        <label class="form-label">Login ID</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="login-id" class="form-control"
                                placeholder="Enter your ID (e.g. STD-1234)" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Verify ID</button>
                </form>
            </div>

            <div id="step-2" class="login-view" style="display: none;">
                <div class="text-center mb-4">
                    <h3 class="text-primary">Set New Password</h3>
                    <p class="text-muted" style="font-size: 0.85rem;">Create a strong password for your account</p>
                </div>

                <div id="pwd-error-msg"
                    style="display: none; color: white; background-color: var(--danger-color); padding: 10px; border-radius: var(--radius-md); text-align: center; margin-bottom: 15px; font-size: 0.9rem;">
                </div>

                <form onsubmit="handleSetPassword(event)">
                    <div class="form-group mb-3">
                        <label class="form-label">New Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="new-password" class="form-control" placeholder="••••••••"
                                required>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirm-password" class="form-control" placeholder="••••••••"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Update Password</button>
                </form>
            </div>

            <div id="step-3" class="login-view" style="display: none; text-align: center; padding: 20px 0;">
                <i class="fas fa-check-circle"
                    style="font-size: 4rem; color: var(--success-color, #28a745); margin-bottom: 20px;"></i>
                <h3 class="text-primary mb-3">Password Updated!</h3>
                <p class="text-muted mb-4" style="font-size: 0.9rem;">Your password has been successfully reset. You can
                    now login with your new credentials.</p>

                <a href="login.html" class="btn btn-primary"
                    style="width: 100%; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box;">Return
                    to Login</a>
            </div>
        </div>
    </div>

    <script>
        // Apply saved dark theme if needed
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        });

        function handleVerifyId(event) {
            event.preventDefault();
            const loginId = document.getElementById('login-id').value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (loginId.length < 3) {
                errorMsg.textContent = 'Please enter a valid Login ID.';
                errorMsg.style.display = 'block';
                return;
            }

            // In a real app, you would make an API call to verify if the ID exists and is valid
            // Mocking successful verification for any input
            errorMsg.style.display = 'none';
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function handleSetPassword(event) {
            event.preventDefault();
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('pwd-error-msg');

            if (newPwd.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters.';
                errorMsg.style.display = 'block';
                return;
            }

            if (newPwd !== confirmPwd) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            // Save the new password to localStorage based on the provided login ID
            const loginId = document.getElementById('login-id').value.trim();
            localStorage.setItem(loginId + '_password', newPwd);

            // Mocking successful password update
            errorMsg.style.display = 'none';
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'block';
        }
    </script>
</body>

</html>
